<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opções de Pagamento | Pagamento Seguro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0055ff;
            --primary-dark: #0033cc;
            --primary-light: #e8f0ff;
            --success: #28a745;
            --danger: #ff3b30;
            --text-dark: #1a1a1a;
            --text-gray: #555;
            --bg-light: #f5f7fa;
            --bg-white: #ffffff;
            --border-color: #e0e4e8;
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-light); color: var(--text-dark); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; background-color: var(--bg-white); box-shadow: var(--shadow-md); border-radius: 12px; overflow: hidden; }
        .header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .payment-option-card { border: 2px solid var(--border-color); border-radius: 16px; padding: 20px; margin-bottom: 20px; cursor: pointer; transition: all 0.3s; }
        .payment-option-card.selected { border-color: var(--primary); background: rgba(0, 85, 255, 0.02); }
        .payment-option-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .promo-badge { background: #e8f5e9; color: #2e7d32; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; }
        .payment-option-price { font-size: 1.5rem; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
        
        .pix-form { display: none; flex-direction: column; gap: 12px; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .payment-option-card.selected .pix-form { display: flex; }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.75rem; font-weight: 700; color: var(--text-gray); text-transform: uppercase; }
        .input-group input { padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; outline: none; font-size: 1rem; }
        .input-group input:focus { border-color: var(--primary); }
        
        .btn-pay { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-pay:disabled { background: #ccc; cursor: not-allowed; }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .error-msg { color: var(--danger); font-size: 0.85rem; font-weight: 600; display: none; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h2>Finalizar Pagamento</h2>
            <p>Pagamento 100% Seguro</p>
        </header>
        <div class="content">
            <div class="payment-option-card selected" id="pix-card">
                <div class="payment-option-title">
                    <i class="fas fa-bolt" style="color: #00bfff;"></i>
                    Pagar Agora - Pix
                    <span class="promo-badge">Promoção</span>
                </div>
                <div class="payment-option-price">R$ 20,00</div>
                <p style="font-size: 0.85rem; color: var(--text-gray);">Liberação imediata e entrega prioritária.</p>
                
                <div class="pix-form">
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="name" placeholder="Seu nome completo" required>
                    </div>
                    <div class="input-group">
                        <label>CPF</label>
                        <input type="tel" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                    <div class="input-group">
                        <label>Telefone</label>
                        <input type="tel" id="phone" placeholder="(00) 00000-0000" required>
                    </div>
                    <div id="error-msg" class="error-msg">Erro ao gerar PIX. Verifique seus dados.</div>
                    <button class="btn-pay" id="btn-generate">GERAR PIX AGORA</button>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <p id="loading-text">Gerando seu código PIX...</p>
        <p style="font-size: 0.8rem; color: #888; margin-top: 5px;">Isso pode levar alguns segundos</p>
    </div>

    <script>
        // Wake up the server as soon as the page loads
        fetch('/health').then(() => console.log('Server is awake')).catch(() => {});

        // Máscaras
        const cpfInput = document.getElementById('cpf');
        const phoneInput = document.getElementById('phone');

        cpfInput.addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
            else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
            e.target.value = v;
        });

        phoneInput.addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            else if (v.length > 6) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
            else if (v.length > 2) v = v.replace(/(\d{2})(\d{0,5})/, "($1) $2");
            e.target.value = v;
        });

        document.getElementById('btn-generate').addEventListener('click', async () => {
            const name = document.getElementById('name').value;
            const cpf = document.getElementById('cpf').value;
            const phone = document.getElementById('phone').value;
            const errorEl = document.getElementById('error-msg');
            const loadingText = document.getElementById('loading-text');

            if (!name || cpf.length < 14 || phone.length < 14) {
                alert('Preencha todos os campos corretamente.');
                return;
            }

            document.getElementById('loading').style.display = 'flex';
            errorEl.style.display = 'none';
            loadingText.textContent = "Conectando ao servidor de pagamento...";

            // Timeout para o fetch (30 segundos)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 35000);

            try {
                const response = await fetch('/proxy/pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        payer_name: name,
                        payer_cpf: cpf,
                        payer_phone: phone
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const data = await response.json();

                if (data.success && data.pixUrl) {
                    loadingText.textContent = "PIX Gerado! Redirecionando...";
                    window.location.href = data.pixUrl;
                } else {
                    errorEl.textContent = data.error || 'Erro ao gerar PIX. Tente novamente.';
                    errorEl.style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (err) {
                clearTimeout(timeoutId);
                if (err.name === 'AbortError') {
                    errorEl.textContent = 'O servidor demorou muito para responder. Tente novamente em alguns segundos.';
                } else {
                    errorEl.textContent = 'Erro de conexão. Verifique sua internet e tente novamente.';
                }
                errorEl.style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        });
    </script>
</body>
</html>
